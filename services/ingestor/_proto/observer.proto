// Minimal Hubble Observer proto subset. Field numbers and message
// shapes mirror the upstream definitions at:
//   https://github.com/cilium/cilium/blob/main/api/v1/observer/observer.proto
//   https://github.com/cilium/cilium/blob/main/api/v1/flow/flow.proto
//
// Vendored on purpose: keeps the ingestor's runtime deps to grpcio only,
// no upstream cilium proto package on the path. When upstream adds
// fields we don't need, we don't have to bump this. When upstream adds
// fields we *do* need, drop them in here and re-run `make protos`.

syntax = "proto3";

package observer;

import "google/protobuf/timestamp.proto";

service Observer {
  rpc GetFlows(GetFlowsRequest) returns (stream GetFlowsResponse);
}

message GetFlowsRequest {
  uint64 number = 1;
  bool follow = 3;
}

message GetFlowsResponse {
  oneof response_types {
    Flow flow = 1;
  }
  string node_name = 1000;
  google.protobuf.Timestamp time = 1001;
}

enum Verdict {
  VERDICT_UNKNOWN = 0;
  FORWARDED = 1;
  DROPPED = 2;
  ERROR = 3;
  AUDIT = 4;
  REDIRECTED = 5;
}

message Flow {
  google.protobuf.Timestamp time = 1;
  Verdict verdict = 2;
  Endpoint source = 13;
  Endpoint destination = 14;
  Layer4 l4 = 7;
}

message Endpoint {
  uint32 id = 1;
  string namespace = 4;
  string pod_name = 6;
}

message Layer4 {
  oneof protocol {
    TCP tcp = 1;
    UDP udp = 2;
  }
}

message TCP {
  uint32 source_port = 1;
  uint32 destination_port = 2;
}

message UDP {
  uint32 source_port = 1;
  uint32 destination_port = 2;
}
