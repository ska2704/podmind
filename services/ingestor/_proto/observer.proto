// Minimal Hubble Observer proto subset. Field numbers and message shapes
// mirror the upstream Cilium v1.19.1 definitions at:
//   https://raw.githubusercontent.com/cilium/cilium/v1.19.1/api/v1/observer/observer.proto
//   https://raw.githubusercontent.com/cilium/cilium/v1.19.1/api/v1/flow/flow.proto
//
// Pinned to the v1.19.1 tag, not main — when bumping Cilium, re-pin the
// tag here and verify field numbers haven't drifted before regenerating.
//
// Vendored on purpose: keeps the ingestor's runtime deps to grpcio only,
// no upstream cilium proto package on the path. When upstream adds
// fields we don't need, we don't have to bump this. When upstream adds
// fields we *do* need, drop them in here and re-run `make protos`.

syntax = "proto3";

package observer;

import "google/protobuf/timestamp.proto";

service Observer {
  rpc GetFlows(GetFlowsRequest) returns (stream GetFlowsResponse);
}

message GetFlowsRequest {
  uint64 number = 1;
  bool follow = 3;
}

message GetFlowsResponse {
  oneof response_types {
    Flow flow = 1;
  }
  string node_name = 1000;
  google.protobuf.Timestamp time = 1001;
}

enum Verdict {
  VERDICT_UNKNOWN = 0;
  FORWARDED = 1;
  DROPPED = 2;
  ERROR = 3;
  AUDIT = 4;
  REDIRECTED = 5;
  TRACED = 6;
  TRANSLATED = 7;
}

message Flow {
  google.protobuf.Timestamp time = 1;
  Verdict verdict = 2;
  // Upstream Flow.l4 sits at tag 6. Tag 7 is `reserved` upstream
  // ("removed, do not use") — our previous proto put l4 there by
  // mistake, which silently dropped all L4 fields on decode.
  Layer4 l4 = 6;
  Endpoint source = 8;
  Endpoint destination = 9;
}

message Endpoint {
  uint32 id = 1;
  string namespace = 3;
  string pod_name = 5;
}

message Layer4 {
  oneof protocol {
    TCP tcp = 1;
    UDP udp = 2;
  }
}

message TCP {
  uint32 source_port = 1;
  uint32 destination_port = 2;
}

message UDP {
  uint32 source_port = 1;
  uint32 destination_port = 2;
}
