// Minimal Hubble Observer proto subset. Field numbers and message shapes
// mirror the upstream Cilium v1.19.1 definitions at:
//   https://raw.githubusercontent.com/cilium/cilium/v1.19.1/api/v1/observer/observer.proto
//   https://raw.githubusercontent.com/cilium/cilium/v1.19.1/api/v1/flow/flow.proto
//
// Pinned to the v1.19.1 tag, not main — when bumping Cilium, re-pin the
// tag here and verify field numbers haven't drifted before regenerating.
//
// Vendored on purpose: keeps the ingestor's runtime deps to grpcio only,
// no upstream cilium proto package on the path. When upstream adds
// fields we don't need, we don't have to bump this. When upstream adds
// fields we *do* need, drop them in here and re-run `make protos`.

syntax = "proto3";

package observer;

import "google/protobuf/timestamp.proto";

service Observer {
  rpc GetFlows(GetFlowsRequest) returns (stream GetFlowsResponse);
}

message GetFlowsRequest {
  uint64 number = 1;
  bool follow = 3;
}

message GetFlowsResponse {
  oneof response_types {
    Flow flow = 1;
  }
  string node_name = 1000;
  google.protobuf.Timestamp time = 1001;
}

enum Verdict {
  VERDICT_UNKNOWN = 0;
  FORWARDED = 1;
  DROPPED = 2;
  ERROR = 3;
  AUDIT = 4;
  REDIRECTED = 5;
  TRACED = 6;
  TRANSLATED = 7;
}

message Flow {
  google.protobuf.Timestamp time = 1;
  Verdict verdict = 2;
  // Upstream Flow.l4 sits at tag 6. Tag 7 is `reserved` upstream
  // ("removed, do not use") — our previous proto put l4 there by
  // mistake, which silently dropped all L4 fields on decode.
  Layer4 l4 = 6;
  Endpoint source = 8;
  Endpoint destination = 9;
  // Datapath observation point. Cilium emits each network event as two
  // flows from different points — TO_STACK from the sender's POV (with
  // source identity), TO_ENDPOINT from the receiver's POV (with dest
  // identity). With socketLB enabled, service-VIP traffic never has
  // both sides identified on the same flow, so consumers must pair
  // halves; observation_point is what tells them which half they have.
  // Field tag is 24 (NOT 30 — verify upstream before changing).
  TraceObservationPoint trace_observation_point = 24;
}

// Mirrored 1:1 from upstream Cilium v1.19.1:
//   https://raw.githubusercontent.com/cilium/cilium/v1.19.1/api/v1/flow/flow.proto
// TraceObservationPoint matches upstream lines 185–232 exactly (incl.
// the deliberate 11→101 gap).
enum TraceObservationPoint {
  UNKNOWN_POINT = 0;
  TO_PROXY = 1;
  TO_HOST = 2;
  TO_STACK = 3;
  TO_OVERLAY = 4;
  FROM_ENDPOINT = 5;
  FROM_PROXY = 6;
  FROM_HOST = 7;
  FROM_STACK = 8;
  FROM_OVERLAY = 9;
  FROM_NETWORK = 10;
  TO_NETWORK = 11;
  FROM_CRYPTO = 12;
  TO_CRYPTO = 13;
  TO_ENDPOINT = 101;
}

message Endpoint {
  uint32 id = 1;
  string namespace = 3;
  string pod_name = 5;
}

message Layer4 {
  oneof protocol {
    TCP tcp = 1;
    UDP udp = 2;
  }
}

message TCP {
  uint32 source_port = 1;
  uint32 destination_port = 2;
}

message UDP {
  uint32 source_port = 1;
  uint32 destination_port = 2;
}
