apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestor
  namespace: podmind
  labels:
    app: ingestor
    podmind.component: ingestor
spec:
  replicas: 1
  strategy:
    # Recreate rather than rolling — the buffer PVC is RWO, two pods
    # would fight for the WAL.
    type: Recreate
  selector:
    matchLabels:
      app: ingestor
  template:
    metadata:
      labels:
        app: ingestor
        podmind.component: ingestor
    spec:
      containers:
        - name: ingestor
          image: podmind/ingestor:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: PROM_URL
              value: http://prometheus.monitoring:9090
            # Single-node: talk to the cilium-agent's local Hubble socket.
            # Multi-node: switch to unix-less form e.g. hubble-relay.kube-system:80.
            - name: HUBBLE_ADDR
              value: unix:///var/run/cilium/hubble.sock
            - name: BUFFER_PATH
              value: /var/lib/podmind/buffer.sqlite
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 10
            initialDelaySeconds: 5
          volumeMounts:
            - name: buffer
              mountPath: /var/lib/podmind
            # Cilium-agent hostpath: parent dir, not the socket directly,
            # so the mount survives agent restarts (the socket appears
            # and disappears inside this dir). Start read-only; relax
            # only if AF_UNIX connect needs write access on some kernels.
            - name: cilium-run
              mountPath: /var/run/cilium
              readOnly: true
      volumes:
        - name: buffer
          persistentVolumeClaim:
            claimName: ingestor-buffer
        - name: cilium-run
          hostPath:
            path: /var/run/cilium
            type: Directory
