apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking
  namespace: sh-core
  labels:
    app: booking
    podmind.component: smarthostel-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: booking
  template:
    metadata:
      labels:
        app: booking
        podmind.component: smarthostel-service
    spec:
      containers:
        - name: booking
          image: nginx:alpine
          ports:
            - name: http
              containerPort: 80
          env:
            - name: SERVICE_NAME
              value: booking
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet: { path: /, port: http }
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /, port: http }
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/booking
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: booking
