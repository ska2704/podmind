apiVersion: apps/v1
kind: Deployment
metadata:
  name: lock-controller
  namespace: sh-edge
  labels:
    app: lock-controller
    podmind.component: smarthostel-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lock-controller
  template:
    metadata:
      labels:
        app: lock-controller
        podmind.component: smarthostel-service
    spec:
      containers:
        - name: lock-controller
          image: nginx:alpine
          ports:
            - name: http
              containerPort: 80
          env:
            - name: SERVICE_NAME
              value: lock-controller
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet: { path: /, port: http }
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /, port: http }
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/lock-controller
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: lock-controller
