apiVersion: apps/v1
kind: Deployment
metadata:
  name: hvac-controller
  namespace: sh-edge
  labels:
    app: hvac-controller
    podmind.component: smarthostel-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hvac-controller
  template:
    metadata:
      labels:
        app: hvac-controller
        podmind.component: smarthostel-service
    spec:
      containers:
        - name: hvac-controller
          image: nginx:alpine
          ports:
            - name: http
              containerPort: 80
          env:
            - name: SERVICE_NAME
              value: hvac-controller
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet: { path: /, port: http }
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /, port: http }
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/hvac-controller
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hvac-controller
